<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifs — Admin Loft Deliciae</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><span>Loft Deliciae</span><small>Administration</small></div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="index.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a class="nav-item" href="reservations.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>Réservations</a>
      <a class="nav-item" href="calendar.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendrier</a>
      <a class="nav-item active" href="tarifs.html"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Tarifs & Extras</a>
    </nav>
    <div class="sidebar-footer"><div class="logout-btn" onclick="logout()">Déconnexion</div></div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Tarifs & Extras</h1>
      <p class="page-sub">Modifiez les prix — mis à jour en temps réel sur le site</p>
    </div>

    <!-- Tarifs séjour -->
    <div class="form-section">
      <div class="form-section-title">Tarifs séjour</div>
      <div class="tarifs-grid" id="tarifsGrid">
        <div style="opacity:0.4;font-size:0.78rem">Chargement...</div>
      </div>
    </div>

    <!-- Extras -->
    <div class="form-section">
      <div class="form-section-title">Options & extras</div>
      <table style="width:100%">
        <thead>
          <tr>
            <th>Option</th>
            <th>Prix</th>
            <th>Actif</th>
          </tr>
        </thead>
        <tbody id="extrasBody">
          <tr><td colspan="3" style="opacity:0.4;text-align:center;padding:2rem">Chargement...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="form-actions">
      <button class="btn-save" onclick="saveTarifs()">Enregistrer les modifications</button>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    let tarifs = [], extras = [];

    async function loadTarifs() {
      const res = await fetch('/api/admin/tarifs', { headers: authHeaders() });
      const data = await res.json();
      tarifs = data.tarifs;
      extras = data.extras;
      renderTarifs();
      renderExtras();
    }

    function renderTarifs() {
      document.getElementById('tarifsGrid').innerHTML = tarifs.map(t => `
        <div class="tarif-card">
          <div class="tarif-label">${t.label}</div>
          <div class="tarif-input">
            <input type="number" id="tarif-${t.type}" value="${t.prix}" min="0" step="10">
            <span>€</span>
          </div>
          <div style="font-size:0.65rem;color:var(--argent);margin-top:0.5rem">${t.nuits} nuit${t.nuits > 1 ? 's' : ''}</div>
        </div>
      `).join('');
    }

    function renderExtras() {
      document.getElementById('extrasBody').innerHTML = extras.map(e => `
        <tr>
          <td>${e.nom}</td>
          <td>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <input type="number" id="extra-prix-${e.key}" value="${e.prix}" min="0" step="5"
                style="width:80px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--perle);padding:0.4rem 0.6rem;font-size:0.85rem;outline:none">
              <span style="color:var(--argent)">€</span>
            </div>
          </td>
          <td>
            <input type="checkbox" id="extra-actif-${e.key}" ${e.actif ? 'checked' : ''}
              style="width:16px;height:16px;accent-color:var(--perle)">
          </td>
        </tr>
      `).join('');
    }

    async function saveTarifs() {
      const updatedTarifs = tarifs.map(t => ({
        type: t.type,
        prix: parseInt(document.getElementById(`tarif-${t.type}`).value) || t.prix
      }));
      const updatedExtras = extras.map(e => ({
        key:   e.key,
        prix:  parseInt(document.getElementById(`extra-prix-${e.key}`).value) || e.prix,
        actif: document.getElementById(`extra-actif-${e.key}`).checked
      }));

      const res = await fetch('/api/admin/tarifs', {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ tarifs: updatedTarifs, extras: updatedExtras })
      });
      if (res.ok) toast('Tarifs enregistrés ✓');
      else toast('Erreur lors de la sauvegarde', 'error');
    }

    loadTarifs();
  </script>
</body>
</html>
